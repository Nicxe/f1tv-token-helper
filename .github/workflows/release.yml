name: Release

on:
  push:
    branches: [beta, main]

permissions:
  contents: write
  issues: write
  pull-requests: write
  packages: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - uses: actions/setup-node@v6
        with:
          node-version: "22"
          cache: "npm"

      - run: npm ci
        env:
          NODE_AUTH_TOKEN: ${{ github.token }}

      - run: npm run build

      - run: npx semantic-release
        env:
          GITHUB_TOKEN: ${{ github.token }}
